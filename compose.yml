name: smart-business-ai

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-business-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_POSTGRES_DB}
      POSTGRES_USER: ${APP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${APP_POSTGRES_PORT}:5432"
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_POSTGRES_USER} -d ${APP_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:6-alpine
    container_name: smart-business-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${APP_REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${APP_REDIS_PORT}:6379"
    volumes:
      - app_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${APP_REDIS_PASSWORD}' ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    image: smart-business-ai-backend:local
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-business-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${APP_POSTGRES_USER}:${APP_POSTGRES_PASSWORD}@postgres:5432/${APP_POSTGRES_DB}
      REDIS_URL: redis://:${APP_REDIS_PASSWORD}@redis:6379/0
      DEMO_PASSWORD: ${DEMO_PASSWORD:?Set DEMO_PASSWORD in .env (minimum 8 characters)}
      DIFY_BASE_URL: ${CONTAINER_DIFY_BASE_URL:-http://host.docker.internal:18080/v1}
      KNOWLEDGE_UPLOAD_DIR: /app/.data/knowledge_documents
    ports:
      - "127.0.0.1:${APP_BACKEND_PORT:-18000}:8000"
    volumes:
      - app_knowledge_data:/app/.data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: smart-business-ai-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-business-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  app_postgres_data:
  app_redis_data:
  app_knowledge_data:
